{# Reusable upload form. Expects `link` (dict with url, doc_type, label). #}
<form class="upload-form" data-url="{{ link.url }}" data-key="{{ link.doc_type }}">
  <label>Upload your {{ link.label }}</label>
  <div class="row">
    <div><input type="file" name="file" required></div>
    <div style="flex:0"><button type="submit">Upload</button></div>
  </div>
  <div class="upload-result"></div>
</form>
