<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Document Portal{% endblock %}</title>
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --line:#334155; --fg:#e2e8f0;
            --muted:#94a3b8; --accent:#6366f1; --ok:#22c55e; --err:#ef4444; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
           background:var(--bg); color:var(--fg); line-height:1.5; }
    .wrap { max-width: 920px; margin: 0 auto; padding: 32px 20px 64px; }
    h1 { font-size: 1.5rem; margin: 0 0 4px; }
    .sub { color: var(--muted); margin: 0 0 24px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:12px;
            padding:20px; margin-bottom:16px; }
    label { display:block; font-size:.85rem; color:var(--muted); margin-bottom:6px; }
    input[type=text], input[type=file] { width:100%; padding:10px 12px; border-radius:8px;
            border:1px solid var(--line); background:#0b1220; color:var(--fg); font-size:1rem; }
    .row { display:flex; gap:16px; flex-wrap:wrap; margin-bottom:16px; }
    .row > div { flex:1; min-width:200px; }
    button { background:var(--accent); color:#fff; border:0; padding:10px 18px;
             border-radius:8px; font-size:1rem; cursor:pointer; }
    button:disabled { opacity:.5; cursor:default; }
    button.ghost { background:transparent; border:1px solid var(--line); color:var(--fg);
             padding:6px 12px; font-size:.8rem; }
    .error { color:var(--err); margin: 8px 0; }
    /* tabs */
    .tabs { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; }
    .tab-btn { background:#0b1220; border:1px solid var(--line); color:var(--muted);
               padding:7px 12px; border-radius:999px; font-size:.82rem; cursor:pointer; }
    .tab-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
    .tab-btn .dot { display:inline-block; width:8px; height:8px; border-radius:50%;
               background:var(--muted); margin-left:6px; vertical-align:middle; }
    .tab-btn .dot.done { background:var(--ok); }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }
    .link-line { display:flex; gap:8px; align-items:center; margin:12px 0;
               font-size:.8rem; color:var(--muted); word-break:break-all; }
    .upload-result { margin-top:12px; font-size:.9rem; }
    .upload-result.ok { color:var(--ok); }
    .upload-result.err { color:var(--err); }
    .badge { display:inline-block; padding:2px 10px; border-radius:999px; font-size:.75rem; }
    .badge.expired { background:#7f1d1d; color:#fecaca; }
    .badge.submitted { background:#14532d; color:#bbf7d0; }
  </style>
</head>
<body>
  <div class="wrap">
    {% block content %}{% endblock %}
  </div>
  <script>
    // Tab switching
    document.addEventListener('click', function (e) {
      var btn = e.target.closest('.tab-btn');
      if (!btn) return;
      var key = btn.dataset.key;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
      document.querySelectorAll('.tab-panel').forEach(p =>
        p.classList.toggle('active', p.dataset.key === key));
    });

    // Copy-to-clipboard
    document.addEventListener('click', function (e) {
      var btn = e.target.closest('[data-copy]');
      if (!btn) return;
      navigator.clipboard.writeText(btn.dataset.copy).then(() => {
        var old = btn.textContent; btn.textContent = 'Copied';
        setTimeout(() => { btn.textContent = old; }, 1200);
      });
    });

    // AJAX upload for any .upload-form (works in tabs and standalone)
    document.addEventListener('submit', async function (e) {
      var form = e.target.closest('.upload-form');
      if (!form) return;
      e.preventDefault();
      var out = form.querySelector('.upload-result');
      var submitBtn = form.querySelector('button[type=submit]');
      var fileInput = form.querySelector('input[type=file]');
      if (!fileInput.files.length) { out.textContent = 'Choose a file first.'; out.className = 'upload-result err'; return; }

      var fd = new FormData();
      fd.append('file', fileInput.files[0]);
      submitBtn.disabled = true;
      out.textContent = 'Uploading…'; out.className = 'upload-result';
      try {
        var res = await fetch(form.dataset.url, { method: 'POST', body: fd });
        var data = await res.json();
        if (data.ok) {
          out.textContent = '✓ ' + data.message; out.className = 'upload-result ok';
          fileInput.disabled = true;
          var dot = document.querySelector('.tab-btn[data-key="' + form.dataset.key + '"] .dot');
          if (dot) dot.classList.add('done');
        } else {
          out.textContent = '✗ ' + data.message; out.className = 'upload-result err';
          submitBtn.disabled = false;
        }
      } catch (err) {
        out.textContent = '✗ Upload failed: ' + err; out.className = 'upload-result err';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
