# Deployment: app + its own Postgres container (temporary).
#
# Two services:
#   app  -> the FastAPI portal, published on host port 2311
#   db   -> Postgres for this app only (not published to the host)
#
# Persistence (survives container restarts/rebuilds):
#   pg_data      -> database files
#   uploads_data -> uploaded documents (LOCAL_STORAGE_DIR=/data/uploads)
# Both are named volumes, stored on the host by Docker — not inside the
# container layer — so data persists.
#
# No .env required: everything the portal needs is set inline below. The app
# runs migrations on startup, then serves.
services:
  app:
    build: .
    image: doc_uploading_service:latest
    container_name: doc_uploading_service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/doc_uploading
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:2311}
      LOCAL_STORAGE_DIR: /data/uploads
      RATE_LIMIT_STORAGE_URI: memory://
      PORTAL_TENANT_NAME: ${PORTAL_TENANT_NAME:-}
      # OCR.space key — interpolated from a server-side .env (kept out of repo).
      # When set, uploads with ocr=true are OCR'd + a .json sidecar is stored.
      OCR_API_KEY: ${OCR_API_KEY:-}
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "2311:8000"
    volumes:
      - uploads_data:/data/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: doc_uploading_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: doc_uploading
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d doc_uploading"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
  uploads_data:
